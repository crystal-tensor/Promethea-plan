id: B10
problem_id: 11
name: Mapping the Boundary of BQP
version: 0.1
status: draft
claim: >
  A useful BQP-boundary program should track not only candidate speedups, but
  also the assumptions under which reductions preserve advantage or collapse
  under data loading, precision, verification, or dequantization.
problem_families:
  - algebraic_hidden_structure
  - Hamiltonian_simulation
  - phase_and_amplitude_estimation
  - quantum_linear_algebra
  - sampling_advantage
  - quantum_machine_learning
  - optimization
  - interactive_verification
boundary_failure_modes:
  - data_loading
  - output_readout
  - precision
  - verification
  - state_preparation
  - dequantization
  - classical_heuristics
  - average_case_assumptions
baselines:
  - textbook_BQP_complete_and_canonical_speedups
  - dequantization_literature_map
  - sampling_complexity_assumption_map
  - oracle_vs_explicit_input_audit
metrics:
  - node_count
  - edge_count
  - advantage_preserving_edge_count
  - fragile_edge_count
  - failure_mode_counts
  - restricted_theorem_target_count
acceptance_threshold:
  minimum_nodes: 10
  minimum_edges: 12
  restricted_theorem_targets: ">=2"
  fragile_edges_tracked: true
  explicit_not_complexity_theorem: true
failure_conditions:
  - graph_only_restates_known_speedups_without_failure_modes
  - reductions_ignore_input_model
  - theorem_targets_have_no_verifiable_assumptions
  - taxonomy_cannot_connect_to_other_benchmarks
next_actions:
  - add_source_backed_literature_links_per_edge
  - formalize_two_restricted_theorem_targets
  - connect_B4_B8_verification_edges
  - connect_B3_B5_simulation_edges
  - add_dequantization_negative_boundary_cards
